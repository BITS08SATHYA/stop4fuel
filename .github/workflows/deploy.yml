name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 607856468014.dkr.ecr.ap-south-1.amazonaws.com
  ECS_CLUSTER: stopforfuel-cluster

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        working-directory: backend
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/stopforfuel-backend:$IMAGE_TAG -t $ECR_REGISTRY/stopforfuel-backend:latest .

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/stopforfuel-backend:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

      - name: Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker push $ECR_REGISTRY/stopforfuel-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/stopforfuel-backend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service stopforfuel-backend-service \
            --force-new-deployment

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        working-directory: frontend
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.stopforfuel.com/api \
            --build-arg NEXT_PUBLIC_COGNITO_USER_POOL_ID=ap-south-1_1jBWQOLC2 \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID=4mgdk5ld0hfc5hglc3tvklr5li \
            --build-arg NEXT_PUBLIC_COGNITO_DOMAIN=stopforfuel-prod.auth.ap-south-1.amazoncognito.com \
            --build-arg NEXT_PUBLIC_AWS_REGION=ap-south-1 \
            --build-arg NEXT_PUBLIC_LANDING_URL=https://stopforfuel.com \
            -t $ECR_REGISTRY/stopforfuel-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/stopforfuel-frontend:latest .

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/stopforfuel-frontend:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

      - name: Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker push $ECR_REGISTRY/stopforfuel-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/stopforfuel-frontend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service stopforfuel-frontend-service \
            --force-new-deployment
