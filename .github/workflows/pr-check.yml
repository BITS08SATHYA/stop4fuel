name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stopforfuel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build & Test
        working-directory: backend
        run: ./gradlew test
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/stopforfuel_test
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test

  frontend-check:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Backend JAR
        working-directory: backend
        run: ./gradlew bootJar

      - name: Build Backend Image
        working-directory: backend
        run: docker build -t stopforfuel-backend:scan .

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "stopforfuel-backend:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend Image
        if: always()
        working-directory: frontend
        run: |
          npm ci
          docker build -t stopforfuel-frontend:scan .

      - name: Scan Frontend Image
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "stopforfuel-frontend:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
