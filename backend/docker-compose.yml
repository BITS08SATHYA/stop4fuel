services:
  postgres:
    image: postgres:16
    container_name: stopforfuel-postgres
    environment:
      POSTGRES_DB: stopforfuel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - stopforfuel_pgdata:/var/lib/postgresql/data

volumes:
  stopforfuel_pgdata: