spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  application:
    name: stopforfuel
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/stopforfuel}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD}
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
      data-locations: classpath:db/seed-data.sql
      separator: ;;

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 4096

server:
  port: ${SERVER_PORT:8080}

spring.security.oauth2.resourceserver.jwt:
  issuer-uri: ${COGNITO_ISSUER_URI:}
  jwk-set-uri: ${COGNITO_JWK_URI:}

spring.cache:
  type: simple

app:
  auth:
    enabled: ${AUTH_ENABLED:true}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:}
    client-id: ${COGNITO_CLIENT_ID:}
    region: ${AWS_REGION:ap-south-1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  debug:
    errors: ${DEBUG_ERRORS:false}

management:
  endpoints:
    web:
      # Serve actuator under /api/actuator so it reaches the backend through
      # the same CloudFront behavior as the rest of /api/*.
      base-path: /api/actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: stopforfuel-backend
      env: ${SPRING_PROFILES_ACTIVE:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  cloudwatch:
    metrics:
      export:
        enabled: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [req=%X{requestId:-}] %logger{36} - %msg%n"
  level:
    org.springframework.data.web.config.SpringDataJacksonConfiguration: ERROR
    org.hibernate.orm.query: ERROR

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:stopforfuel}
    region: ${AWS_REGION:us-east-1}
    profile: ${AWS_S3_PROFILE:default}
