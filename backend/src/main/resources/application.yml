spring:
  application:
    name: stopforfuel
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://172.19.0.2:5432/stopforfuel}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      data-locations: classpath:db/seed-data.sql
      separator: ;;

server:
  port: ${SERVER_PORT:8080}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:stopforfuel-uploads}
    region: ${AWS_REGION:ap-south-1}
    profile: ${AWS_S3_PROFILE:}
