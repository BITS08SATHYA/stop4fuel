services:
  postgres:
    image: REDACTED.dkr.ecr.us-east-1.amazonaws.com/stopforfuel-db:latest
    container_name: stopforfuel-postgres
    environment:
      POSTGRES_DB: stopforfuel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - stopforfuel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stopforfuel"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - stopforfuel-net

  backend:
    image: REDACTED.dkr.ecr.us-east-1.amazonaws.com/stopforfuel-backend:latest
    container_name: stopforfuel-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/stopforfuel
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-password}
      AUTH_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stopforfuel-net

  frontend:
    image: REDACTED.dkr.ecr.us-east-1.amazonaws.com/stopforfuel-frontend:latest
    container_name: stopforfuel-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - stopforfuel-net

volumes:
  stopforfuel_pgdata:

networks:
  stopforfuel-net:
    driver: bridge
