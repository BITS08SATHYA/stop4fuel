services:
  postgres:
    image: postgres:16
    container_name: stopforfuel-postgres
    environment:
      POSTGRES_DB: stopforfuel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - stopforfuel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stopforfuel"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: 971422715802.dkr.ecr.us-east-1.amazonaws.com/stopforfuel-backend:latest
    container_name: stopforfuel-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/stopforfuel
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: 971422715802.dkr.ecr.us-east-1.amazonaws.com/stopforfuel-frontend:latest
    container_name: stopforfuel-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  stopforfuel_pgdata:
